<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POF Sidebar — Notion / Missive</title>

  <!-- Fonts (POF DS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="sidebar.css?v=2">
</head>
<body>

  <!-- ═══════════════════════════════════════════════ TABS -->
  <div class="tabs-wrap">
    <nav class="tabs" role="tablist">
      <button class="tab" data-pane="task" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><path d="M9 11l3 3l8 -8"/><path d="M20 12v6a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h9"/></svg>
        Tâche
      </button>
      <button class="tab active" data-pane="contact" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"/><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/></svg>
        Contact
      </button>
      <button class="tab" data-pane="conv" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><path d="M4 21v-13a3 3 0 0 1 3 -3h10a3 3 0 0 1 3 3v6a3 3 0 0 1 -3 3h-9l-4 4"/><path d="M8 9h8"/><path d="M8 13h6"/></svg>
        Conv.
      </button>
    </nav>
  </div>

  <div class="scroll">

    <!-- ── TÂCHE ─────────────────────────────────── -->
    <section class="pane" id="pane-task" data-screen-label="Tâche">
      <div class="waiting">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4"><path d="M9 11l3 3l8 -8"/><path d="M20 12v6a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h9"/></svg>
        <div class="msg">Onglet Tâche — à configurer</div>
      </div>
    </section>

    <!-- ── CONTACT ───────────────────────────────── -->
    <section class="pane active" id="pane-contact" data-screen-label="Contact">
      <div class="label">Contact principal</div>
      <div id="main-contact">
        <div class="waiting">
          <div class="spinner"></div>
          <div class="msg">En attente d'une conversation…</div>
        </div>
      </div>

      <div id="others-section" style="display:none">
        <hr class="divider">
        <div class="label">Autres participants</div>
        <div id="others-list"></div>
      </div>
    </section>

    <!-- ── CONVERSATION ──────────────────────────── -->
    <section class="pane" id="pane-conv" data-screen-label="Conversation">
      <div class="label">Instructions conversation</div>
      <p class="intro">
        Ces instructions sont accessibles par les agents de traitement pour contextualiser leurs actions sur cette conversation.
      </p>
      <textarea id="conv-textarea" rows="6" placeholder="Ex : Marc est en négociation avancée. Rester factuel, pas d'engagement tarifaire sans validation Benoît…"></textarea>
      <div class="save-bar">
        <button class="btn btn-ghost" onclick="resetConv()">Annuler</button>
        <button class="btn btn-primary" id="conv-save-btn" onclick="saveConv()">Sauvegarder</button>
      </div>

      <hr class="divider" style="margin-top:24px">
      <div class="label">
        <svg style="width:11px;height:11px;vertical-align:-1px;margin-right:2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M5 9l14 0"/><path d="M5 15l14 0"/><path d="M11 4l-4 16"/><path d="M17 4l-4 16"/></svg>
        Missive conversation ID
      </div>
      <div class="conv-id" id="conv-missive-id">—</div>
    </section>

  </div><!-- /scroll -->

  <!-- ═══════════════════════════════════════════════ FOOTER -->
  <footer class="sb-footer" title="Plastic Odyssey Factories">
    <img src="assets/pof-logo-color.svg" alt="Plastic Odyssey Factories" class="footer-logo">
  </footer>

  <!-- ═══════════════════════════════════ MOCK (preview only) ═══ -->
  <!-- Mock activates ONLY when ?preview=1 is in the URL (standalone design review).
       In Missive prod, the SDK script tag below loads first and provides window.Missive. -->
  <script>
    if (location.search.indexOf('preview=1') !== -1) {
      window.__POF_MOCK = true;
      window.__POF_DEMO_STATE = 'found'; // 'found' | 'folk' | 'missing' | 'loading' | 'empty'

      // Mock Missive SDK
      window.Missive = {
        on(evt, cb) { window.__POF_MISSIVE_CB = cb; }
      };

      const FIXTURES = {
        main: { name: 'Marc Castagnet', email: 'marc.castagnet@icservices.com.hk' },
        others: [
          { name: 'Esther Wong',     email: 'esther.wong@icservices.com.hk' },
          { name: 'Thibault Kheres', email: 'thibault.kheres@plasticodyssey.org' },
          { name: 'Benoit Blancher', email: 'benoit@plasticodyssey.org' },
        ],
      };

      window.__pofMock = function(action, args) {
        const state = window.__POF_DEMO_STATE;
        const main  = FIXTURES.main;

        return new Promise(resolve => {
          const delay = action.startsWith('lookup') ? 700 : 300;
          setTimeout(() => {
            if (action === 'lookup_person') {
              if (state === 'found' && args.email === main.email) {
                return resolve({
                  found: true,
                  name: main.name,
                  email: main.email,
                  notion_page_id: '4f8a2c1e9b3d4a7e8c5f6b9a2d1e0c4b',
                  notion_page_url: 'https://notion.so/4f8a2c1e9b3d4a7e8c5f6b9a2d1e0c4b',
                  person_instructions: 'Negotiation in progress on ICS investment (100K€). Reply factually, no pricing commitment without Benoît\'s green light. Marc is direct — keep replies short.'
                });
              }
              // Random others: ~50% found
              if (args.email !== main.email) {
                const hit = ['thibault.kheres@plasticodyssey.org', 'benoit@plasticodyssey.org'].includes(args.email);
                return resolve(hit
                  ? { found: true, name: args.name, email: args.email, notion_page_id: 'aaa111bbb222ccc333' }
                  : { found: false });
              }
              return resolve({ found: false });
            }
            if (action === 'lookup_folk') {
              if (state === 'folk')    return resolve({ found: true });
              if (state === 'missing') return resolve({ found: false });
              return resolve({ found: false });
            }
            if (action === 'lookup_conv') {
              return resolve({
                instructions: 'Toujours répondre à Thibault en copie. Marc préfère le français.',
                notion_page_id: 'conv-page-id'
              });
            }
            if (action === 'upsert_conv')                 return resolve({ success: true, notion_page_id: 'conv-page-id' });
            if (action === 'update_person_instructions')  return resolve({ success: true });
            if (action === 'create_person') return resolve({
              success: true,
              notion_page_id: 'newly000created111page222',
              notion_page_url: 'https://notion.so/newly000created111page222',
            });
            resolve({});
          }, delay);
        });
      };

      // Trigger conversation event after boot
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          if (!window.__POF_MISSIVE_CB) return;
          const state = window.__POF_DEMO_STATE;
          if (state === 'empty') {
            window.__POF_MISSIVE_CB('conv-empty-001', { conversation: { messages: [{}] } });
          } else if (state === 'loading') {
            // do nothing -> stays in 'En attente…'
          } else {
            window.__POF_MISSIVE_CB('conv-demo-001', {
              conversation: {
                latest_message: {
                  from_field: FIXTURES.main,
                  to_fields:  [FIXTURES.others[0]],
                  cc_fields:  [FIXTURES.others[1], FIXTURES.others[2]],
                }
              }
            });
          }
        }, 50);
      });
    }
  </script>

  <!-- Missive SDK (prod). Skipped in preview mode where the mock above
       has already set window.Missive. -->
  <script>
    if (!window.__POF_MOCK) {
      document.write('<scr' + 'ipt src="https://missiveapp.com/open/sidebar-sdk/2.0/sdk.js"></scr' + 'ipt>');
    }
  </script>

  <!-- Sidebar logic -->
  <script src="sidebar.js?v=2"></script>

</body>
</html>
